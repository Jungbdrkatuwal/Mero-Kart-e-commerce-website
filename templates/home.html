{% extends 'base.html' %}
{% load static %}


{% block content %}

<section class="section-intro padding-y-sm">
<div class="container">

<div class="intro-banner-wrap">
	<img src="{% static 'images/banners/cover.jpg' %}" class="img-fluid rounded">
</div>

</div>
</section>

<section class="section-name padding-y-sm">
<div class="container">

<header class="section-heading">
	<a href="{% url 'store' %}" class="btn btn-outline-primary float-right">See all</a>
	<h3 class="section-title">Popular products</h3>
</header>

	
<div class="row">
	{% for product in products %}
	<div class="col-md-3">
		<div class="card card-product-grid">
			<a href="{{ product.get_url }}" class="img-wrap"> <img src="{{ product.images.url}}"> </a>
			<figcaption class="info-wrap">
				<a href="{{ product.get_url }}" class="title">{{ product.product_name }}</a>
				<div class="price mt-1">Rs. {{ product.price }}</div>
			</figcaption>
		</div>
	</div>
	{% endfor %}
</div>
</div>

{% if recommended_products %}
<br>
<header class="section-heading mt-4">
	<h3 class="section-title text-warning"><i class="fas fa-star"></i> Recommended For You</h3>
</header>
<div class="row mb-4">
	{% for product in recommended_products %}
	<div class="col-md-3">
		<div class="card card-product-grid" style="border: 2px solid #ffc107; box-shadow: 0 4px 12px rgba(255, 193, 7, 0.2);">
			<div class="badge badge-warning text-white" style="position: absolute; top: 10px; right: 10px; z-index: 10; font-size: 12px; padding: 5px 10px; background-color: #ffc107;">Top Pick</div>
			<a href="{{ product.get_url }}" class="img-wrap"> <img src="{{ product.images.url}}"> </a>
			<figcaption class="info-wrap">
				<a href="{{ product.get_url }}" class="title">{{ product.product_name }}</a>
				<div class="price mt-1">Rs. {{ product.price }}</div>
			</figcaption>
		</div>
	</div>
	{% endfor %}
</div>
{% endif %}

</div>
</section>


</body>
</html>

{% endblock content %}
